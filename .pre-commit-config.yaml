# Pre-commit checks for claude-plugins.
#
# The fast static checks (shellcheck, file hygiene) run here and are mirrored
# in CI via `pre-commit run --all-files`, so .pre-commit-config.yaml is the
# single source of truth. Secret scanning needs Docker.
#
# One-time setup:
#   pip install pre-commit
#   pre-commit install                       # static checks + gitleaks on commit
#   pre-commit install --hook-type pre-push  # trufflehog before every push
#
# Run everything over the whole repo:
#   pre-commit run --all-files
repos:
  # --- Shell linting (the plugin hooks are bash) ---
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  # --- Generic file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # --- Secret scanning (Docker-based) ---
  - repo: local
    hooks:
      # Fast format/entropy scan of the staged diff — blocks the commit.
      - id: gitleaks
        name: gitleaks (secret scan)
        entry: bash -c 'docker run --rm -v "$(pwd):/repo" zricethezav/gitleaks:latest protect --staged --source=/repo --redact --no-banner --verbose'
        language: system
        pass_filenames: false
      # Verified-secret scan of history — runs on push so commits stay fast.
      - id: trufflehog
        name: trufflehog (verified secrets)
        entry: bash -c 'docker run --rm -v "$(pwd):/repo" trufflesecurity/trufflehog:latest git file:///repo --only-verified --fail --no-update'
        language: system
        stages: [pre-push]
        pass_filenames: false
